<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프랙탈 시뮬레이션</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; text-align: center; }
        p { color: #aaaaaa; margin-bottom: 20px; text-align: center; line-height: 1.5; }
        
        /* 프랙탈 선택 버튼 */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: #4ade80;
            color: #000;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        .controls {
            background-color: #2a2a2a;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        input[type="range"] { width: 150px; cursor: pointer; }
        .disabled { opacity: 0.4; pointer-events: none; }

        canvas {
            background-color: #0f0f0f;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
            max-width: 100%;
            border: 1px solid #333;
        }
        
        /* 연산 데이터 패널 */
        .panel-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }
        .data-panel, .formula-panel {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .data-panel { border-left: 4px solid #4ade80; }
        .formula-panel { border-left: 4px solid #3b82f6; }
        
        .panel-title { margin: 0 0 15px 0; font-size: 16px; }
        .data-title { color: #4ade80; }
        .formula-title { color: #3b82f6; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .data-item { background: #1e1e1e; padding: 12px; border-radius: 6px; border: 1px solid #333; }
        .data-label { font-size: 12px; color: #888; margin-bottom: 5px; display: block; }
        .data-value { font-size: 16px; font-weight: bold; color: #fff; }
        
        .status-safe { color: #4ade80; }
        .status-warn { color: #facc15; }
        .status-stop { color: #ef4444; }

        .formula-box { background: #1e1e1e; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
        .formula-box:last-child { margin-bottom: 0; }
        .formula-box h4 { margin: 0 0 10px 0; color: #aaa; font-size: 13px; }
        .math-expr { font-family: 'Courier New', Courier, monospace; font-size: 15px; color: #e2e8f0; line-height: 1.6; background-color: #111; padding: 10px; border-radius: 4px; }
        .highlight { color: #3b82f6; font-weight: bold; font-size: 17px; }
    </style>
</head>
<body>

    <h1>프랙탈 시뮬레이션</h1>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="setFractal('tree')">🌳 프랙탈 나무</button>
        <button class="tab-btn" onclick="setFractal('sierpinski')">🔺 시에르핀스키 삼각형</button>
        <button class="tab-btn" onclick="setFractal('koch')">❄️ 코크 눈꽃</button>
        <button class="tab-btn" onclick="setFractal('cantor')">➖ 칸토어 집합</button>
    </div>

    <div class="controls">
        <div class="control-group" id="ctrl-angle">
            <label for="angle">가지 회전 각도: <span id="angleVal">25</span>°</label>
            <input type="range" id="angle" min="10" max="90" value="25">
        </div>
        <div class="control-group" id="ctrl-ratio">
            <label for="ratio">길이 감소 비율 (r): <span id="ratioVal">0.70</span></label>
            <input type="range" id="ratio" min="0.50" max="0.80" step="0.01" value="0.70">
        </div>
        <div class="control-group">
            <label for="depth">한계 단계 (n): <span id="depthVal">6</span></label>
            <input type="range" id="depth" min="1" max="12" value="6">
        </div>
    </div>

    <canvas id="fractalCanvas" width="800" height="500"></canvas>

    <div class="panel-container">
        <div class="data-panel">
            <h3 class="panel-title data-title">📊 연산 결과</h3>
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">분할된 총 개수</span>
                    <span class="data-value" id="calc-count">0 개</span>
                </div>
                <div class="data-item">
                    <span class="data-label">최종 단계 1개의 길이 (L_n)</span>
                    <span class="data-value" id="calc-smallest">0 px</span>
                </div>
                <div class="data-item">
                    <span class="data-label">알고리즘 상태 (1px 기준)</span>
                    <span class="data-value status-safe" id="calc-status">안전</span>
                </div>
            </div>
        </div>

        <div class="formula-panel">
            <h3 class="panel-title formula-title">📐 대수학 수식 (상용로그 적용)</h3>
            <div class="formula-box">
                <h4>1. 등비수열의 점화식 (최소 단위 길이 예측)</h4>
                <div class="math-expr" id="formula-length">수식 계산 중...</div>
            </div>
            <div class="formula-box">
                <h4>2. 상용로그 부등식 (메모리 과부하 한계점 역산)</h4>
                <div class="math-expr" id="formula-log">수식 계산 중...</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentFractal = 'tree';

        const angleSlider = document.getElementById('angle');
        const ratioSlider = document.getElementById('ratio');
        const depthSlider = document.getElementById('depth');

        // 프랙탈 종류 변경 함수
        function setFractal(type) {
            currentFractal = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 프랙탈별 컨트롤러 활성/비활성 처리
            if(type === 'tree') {
                document.getElementById('ctrl-angle').classList.remove('disabled');
                document.getElementById('ctrl-ratio').classList.remove('disabled');
                depthSlider.max = 14;
            } else {
                document.getElementById('ctrl-angle').classList.add('disabled');
                document.getElementById('ctrl-ratio').classList.add('disabled');
                if(type === 'sierpinski') depthSlider.max = 10;
                if(type === 'koch') depthSlider.max = 8;
                if(type === 'cantor') depthSlider.max = 10;
            }
            depthSlider.value = Math.min(depthSlider.value, depthSlider.max);
            update();
        }

        // ================= 그리기 알고리즘 (재귀 함수) =================
        // 1. 프랙탈 나무
        function drawTree(x, y, len, angle, depth) {
            ctx.beginPath(); ctx.save();
            ctx.translate(x, y); ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0); ctx.lineTo(0, -len);
            ctx.strokeStyle = depth <= 2 ? '#4ade80' : '#8b5a2b';
            ctx.lineWidth = depth; ctx.stroke();

            if (depth > 1) {
                const r = parseFloat(ratioSlider.value);
                const a = parseInt(angleSlider.value);
                drawTree(0, -len, len * r, -a, depth - 1);
                drawTree(0, -len, len * r, a, depth - 1);
            }
            ctx.restore();
        }

        // 2. 시에르핀스키 삼각형
        function drawSierpinski(x, y, size, depth) {
            if (depth === 1) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + size / 2, y - size * Math.sqrt(3) / 2);
                ctx.lineTo(x + size, y);
                ctx.closePath();
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; ctx.fill();
            } else {
                drawSierpinski(x, y, size / 2, depth - 1);
                drawSierpinski(x + size / 2, y, size / 2, depth - 1);
                drawSierpinski(x + size / 4, y - (size / 2) * Math.sqrt(3) / 2, size / 2, depth - 1);
            }
        }

        // 3. 코크 눈꽃 (선분 분할)
        function drawKochLine(x1, y1, x2, y2, depth) {
            if (depth === 1) {
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1; ctx.stroke();
            } else {
                const dx = x2 - x1, dy = y2 - y1;
                const p1x = x1 + dx / 3, p1y = y1 + dy / 3;
                const p3x = x1 + 2 * dx / 3, p3y = y1 + 2 * dy / 3;
                const p2x = p1x + (dx / 3) * Math.cos(-Math.PI/3) - (dy / 3) * Math.sin(-Math.PI/3);
                const p2y = p1y + (dx / 3) * Math.sin(-Math.PI/3) + (dy / 3) * Math.cos(-Math.PI/3);

                drawKochLine(x1, y1, p1x, p1y, depth - 1);
                drawKochLine(p1x, p1y, p2x, p2y, depth - 1);
                drawKochLine(p2x, p2y, p3x, p3y, depth - 1);
                drawKochLine(p3x, p3y, x2, y2, depth - 1);
            }
        }

        // 4. 칸토어 집합
        function drawCantor(x, y, len, depth) {
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + len, y);
            ctx.strokeStyle = '#facc15'; ctx.lineWidth = 8; ctx.stroke();
            if (depth > 1) {
                drawCantor(x, y + 40, len / 3, depth - 1);
                drawCantor(x + 2 * len / 3, y + 40, len / 3, depth - 1);
            }
        }

        // ================= 수학 연산 및 패널 업데이트 =================
        function updateMathPanels(n) {
            let L1, r, countFormula, lengthFormula, logLimit, totalCount, smallestLength;

            // 프랙탈별 수학적 특징 정의
            if (currentFractal === 'tree') {
                L1 = 140; r = parseFloat(ratioSlider.value);
                totalCount = Math.pow(2, n) - 1;
                smallestLength = L1 * Math.pow(r, n - 1);
                countFormula = `2<sup>n</sup> - 1`;
            } else if (currentFractal === 'sierpinski') {
                L1 = 400; r = 0.5; // 변의 길이는 절반씩 줆
                totalCount = Math.pow(3, n - 1);
                smallestLength = L1 * Math.pow(r, n - 1);
                countFormula = `3<sup>n-1</sup>`;
            } else if (currentFractal === 'koch') {
                L1 = 300; r = 1/3;
                totalCount = 3 * Math.pow(4, n - 1); // 눈꽃은 3면에서 시작
                smallestLength = L1 * Math.pow(r, n - 1);
                countFormula = `3 × 4<sup>n-1</sup>`;
            } else if (currentFractal === 'cantor') {
                L1 = 600; r = 1/3;
                totalCount = Math.pow(2, n - 1);
                smallestLength = L1 * Math.pow(r, n - 1);
                countFormula = `2<sup>n-1</sup>`;
            }

            // 로그 부등식 역산 (n > 1 - log(L1)/log(r))
            const logL1 = Math.log10(L1);
            const logR = Math.log10(r);
            const limitN = 1 - (logL1 / logR);

            // 1. 데이터 패널 업데이트
            document.getElementById('calc-count').textContent = totalCount.toLocaleString() + " 개";
            document.getElementById('calc-smallest').textContent = smallestLength.toFixed(2) + " px";
            
            const statusEl = document.getElementById('calc-status');
            if (smallestLength < 1) {
                statusEl.textContent = "최적화 발동 (1px 미만 통제됨)"; statusEl.className = "data-value status-stop";
            } else if (smallestLength < 3) {
                statusEl.textContent = "경고 (한계점 근접)"; statusEl.className = "data-value status-warn";
            } else {
                statusEl.textContent = "안전 (연산 여유 있음)"; statusEl.className = "data-value status-safe";
            }

            // 2. 수식 패널 업데이트
            const rText = (currentFractal === 'koch' || currentFractal === 'cantor') ? '(1/3)' : r.toFixed(2);
            document.getElementById('formula-length').innerHTML = 
                `L<sub>n</sub> = L<sub>1</sub> × r<sup>n-1</sup> <br>` +
                `L<sub>${n}</sub> = ${L1} × ${rText}<sup>${n}-1</sup> <br>` + 
                `=> <span class="highlight">${smallestLength.toFixed(2)} px</span> &nbsp; (분할 개수: ${countFormula} = ${totalCount.toLocaleString()}개)`;

            document.getElementById('formula-log').innerHTML = 
                `L<sub>1</sub> × r<sup>n-1</sup> < 1 &nbsp; (양변에 상용로그 log 취함) <br>` +
                `n > 1 - { log(L<sub>1</sub>) / log(r) } <br>` +
                `n > 1 - { log(${L1}) / log(${rText}) } <br>` +
                `=> <span class="highlight">n > ${limitN.toFixed(2)}</span> &nbsp; (안전 한계 기저 조건: <b>${Math.floor(limitN)}</b> 단계)`;
        }

        // ================= 메인 렌더링 =================
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const n = parseInt(depthSlider.value);
            
            document.getElementById('angleVal').textContent = angleSlider.value;
            document.getElementById('ratioVal').textContent = parseFloat(ratioSlider.value).toFixed(2);
            document.getElementById('depthVal').textContent = n;

            // 수학 연산 업데이트
            updateMathPanels(n);

            // 프랙탈 렌더링
            if (currentFractal === 'tree') {
                drawTree(canvas.width / 2, canvas.height, 140, 0, n);
            } else if (currentFractal === 'sierpinski') {
                drawSierpinski(canvas.width / 2 - 200, canvas.height - 50, 400, n);
            } else if (currentFractal === 'koch') {
                // 눈꽃 모양 (정삼각형 3면)
                const x1 = canvas.width/2 - 150, y1 = canvas.height/2 + 80;
                const x2 = canvas.width/2 + 150, y2 = canvas.height/2 + 80;
                const x3 = canvas.width/2, y3 = canvas.height/2 - 150 * Math.sqrt(3) + 80;
                drawKochLine(x1, y1, x3, y3, n);
                drawKochLine(x3, y3, x2, y2, n);
                drawKochLine(x2, y2, x1, y1, n);
            } else if (currentFractal === 'cantor') {
                drawCantor(100, 50, 600, n);
            }
        }

        angleSlider.addEventListener('input', update);
        ratioSlider.addEventListener('input', update);
        depthSlider.addEventListener('input', update);
        
        update();
    </script>
</body>
</html>
