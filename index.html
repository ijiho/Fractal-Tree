<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프랙탈 시뮬레이션</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; text-align: center; }
        p { color: #aaaaaa; margin-bottom: 20px; text-align: center; line-height: 1.5; }
        
        /* 모드 전환 및 프랙탈 탭 */
        .top-menu { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 800px; }
        .mode-switch, .tab-menu { display: flex; gap: 10px; }
        
        .btn {
            padding: 10px 20px; font-size: 15px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            background-color: #333; color: #fff; transition: 0.3s;
        }
        .btn.active-mode { background-color: #facc15; color: #000; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .btn.active-tab { background-color: #4ade80; color: #000; box-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }

        .controls {
            background-color: #2a2a2a; padding: 20px 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; gap: 25px;
            margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 800px; box-sizing: border-box;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        input[type="range"] { width: 150px; cursor: pointer; }
        .disabled { opacity: 0.4; pointer-events: none; }

        /* 뷰어 컨테이너 (2D/3D 교차 화면) */
        .viewer-container {
            width: 100%; max-width: 800px; height: 500px; position: relative;
            background-color: #0f0f0f; border-radius: 12px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15); border: 1px solid #333; overflow: hidden;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 데이터 및 수식 패널 */
        .panel-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 800px; margin-top: 20px; }
        .data-panel, .formula-panel { background-color: #222; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .data-panel { border-left: 4px solid #4ade80; }
        .formula-panel { border-left: 4px solid #3b82f6; }
        
        .panel-title { margin: 0 0 15px 0; font-size: 16px; }
        .data-title { color: #4ade80; }
        .formula-title { color: #3b82f6; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .data-item { background: #1e1e1e; padding: 12px; border-radius: 6px; border: 1px solid #333; }
        .data-label { font-size: 12px; color: #888; margin-bottom: 5px; display: block; }
        .data-value { font-size: 16px; font-weight: bold; color: #fff; }
        
        .status-safe { color: #4ade80; } .status-warn { color: #facc15; } .status-stop { color: #ef4444; }

        .formula-box { background: #1e1e1e; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
        .formula-box:last-child { margin-bottom: 0; }
        .formula-box h4 { margin: 0 0 10px 0; color: #aaa; font-size: 13px; }
        .math-expr { font-family: 'Courier New', Courier, monospace; font-size: 15px; color: #e2e8f0; line-height: 1.6; background-color: #111; padding: 10px; border-radius: 4px; }
        .highlight { color: #3b82f6; font-weight: bold; font-size: 17px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <h1>프랙탈 시뮬레이션</h1>


    <div class="top-menu">
        <div class="mode-switch">
            <button id="btn2D" class="btn active-mode" onclick="setMode('2D')">🖥️ 평면(2D)</button>
            <button id="btn3D" class="btn" onclick="setMode('3D')">🧊 입체(3D)</button>
        </div>
        <div class="tab-menu">
            <button id="tab-tree" class="btn active-tab" onclick="setFractal('tree')">🌳 프랙탈 나무</button>
            <button id="tab-sierpinski" class="btn" onclick="setFractal('sierpinski')">🔺 시에르핀스키 삼각형</button>
            <button id="tab-koch" class="btn" onclick="setFractal('koch')">❄️ 코크 눈꽃</button>
            <button id="tab-cantor" class="btn" onclick="setFractal('cantor')">➖ 칸토어 집합</button>
        </div>
    </div>

    <div class="controls">
        <div class="control-group" id="ctrl-angle">
            <label for="angle">가지 회전 각도: <span id="angleVal">25</span>°</label>
            <input type="range" id="angle" min="10" max="90" value="25">
        </div>
        <div class="control-group" id="ctrl-ratio">
            <label for="ratio">길이 감소 비율 (r): <span id="ratioVal">0.70</span></label>
            <input type="range" id="ratio" min="0.50" max="0.80" step="0.01" value="0.70">
        </div>
        <div class="control-group">
            <label for="depth">렌더링 한계 단계 (n): <span id="depthVal">6</span></label>
            <input type="range" id="depth" min="1" max="12" value="6">
        </div>
    </div>

    <div class="viewer-container" id="viewer">
        <canvas id="canvas2D" width="800" height="500"></canvas>
    </div>

    <div class="panel-container">
        <div class="data-panel">
            <h3 class="panel-title data-title">📊 연산 결과</h3>
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">분할된 총 개수</span>
                    <span class="data-value" id="calc-count">0 개</span>
                </div>
                <div class="data-item">
                    <span class="data-label">최종 단계 1개의 길이 (L_n)</span>
                    <span class="data-value" id="calc-smallest">0 px</span>
                </div>
            </div>
        </div>

        <div class="formula-panel">
            <h3 class="panel-title formula-title">📐 대수학 수식 (상용로그 적용)</h3>
            <div class="formula-box">
                <h4>1. 등비수열의 점화식 (최소 단위 길이 예측)</h4>
                <div class="math-expr" id="formula-length">수식 계산 중...</div>
            </div>
            <div class="formula-box">
                <h4>2. 상용로그 부등식 (메모리 과부하 한계점)</h4>
                <div class="math-expr" id="formula-log">수식 계산 중...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 전역 변수 설정 ---
        let currentMode = '2D';
        let currentFractal = 'tree';

        const angleSlider = document.getElementById('angle');
        const ratioSlider = document.getElementById('ratio');
        const depthSlider = document.getElementById('depth');
        const canvas2D = document.getElementById('canvas2D');
        const ctx2D = canvas2D.getContext('2d');
        const viewer = document.getElementById('viewer');

        // --- 3D 환경 설정 (Three.js) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 800/500, 0.1, 1000);
        camera.position.set(0, 50, 180);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(800, 500);
        renderer.domElement.style.display = 'none';
        viewer.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 30, 0);
        controls.enableDamping = true;
        let fractal3DObject = null;

        // --- 모드 및 탭 전환 로직 ---
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn2D').classList.toggle('active-mode', mode === '2D');
            document.getElementById('btn3D').classList.toggle('active-mode', mode === '3D');
            canvas2D.style.display = mode === '2D' ? 'block' : 'none';
            renderer.domElement.style.display = mode === '3D' ? 'block' : 'none';
            update();
        }

        function setFractal(type) {
            currentFractal = type;
            document.querySelectorAll('.tab-menu .btn').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('tab-' + type).classList.add('active-tab');

            if(type === 'tree') {
                document.getElementById('ctrl-angle').classList.remove('disabled');
                document.getElementById('ctrl-ratio').classList.remove('disabled');
                depthSlider.max = 14;
            } else {
                document.getElementById('ctrl-angle').classList.add('disabled');
                document.getElementById('ctrl-ratio').classList.add('disabled');
                if(type === 'sierpinski') depthSlider.max = 10;
                if(type === 'koch') depthSlider.max = 7;
                if(type === 'cantor') depthSlider.max = 10;
            }
            depthSlider.value = Math.min(depthSlider.value, depthSlider.max);
            update();
        }

        // ================= 2D 렌더링 엔진 =================
        function render2D(n, r, a) {
            ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
            
            function drawTree(x, y, len, angle, depth) {
                ctx2D.beginPath(); ctx2D.save();
                ctx2D.translate(x, y); ctx2D.rotate(angle * Math.PI / 180);
                ctx2D.moveTo(0, 0); ctx2D.lineTo(0, -len);
                ctx2D.strokeStyle = depth <= 2 ? '#4ade80' : '#8b5a2b';
                ctx2D.lineWidth = depth; ctx2D.stroke();
                if (depth > 1) {
                    drawTree(0, -len, len * r, -a, depth - 1);
                    drawTree(0, -len, len * r, a, depth - 1);
                }
                ctx2D.restore();
            }

            function drawSierpinski(x, y, size, depth) {
                if (depth === 1) {
                    ctx2D.beginPath(); ctx2D.moveTo(x, y);
                    ctx2D.lineTo(x + size / 2, y - size * Math.sqrt(3) / 2);
                    ctx2D.lineTo(x + size, y); ctx2D.closePath();
                    ctx2D.strokeStyle = '#3b82f6'; ctx2D.lineWidth = 1; ctx2D.stroke();
                    ctx2D.fillStyle = 'rgba(59, 130, 246, 0.2)'; ctx2D.fill();
                } else {
                    drawSierpinski(x, y, size / 2, depth - 1);
                    drawSierpinski(x + size / 2, y, size / 2, depth - 1);
                    drawSierpinski(x + size / 4, y - (size / 2) * Math.sqrt(3) / 2, size / 2, depth - 1);
                }
            }

            function drawKoch(x1, y1, x2, y2, depth) {
                if (depth === 1) {
                    ctx2D.beginPath(); ctx2D.moveTo(x1, y1); ctx2D.lineTo(x2, y2);
                    ctx2D.strokeStyle = '#e2e8f0'; ctx2D.lineWidth = 1; ctx2D.stroke();
                } else {
                    const dx = x2 - x1, dy = y2 - y1;
                    const p1x = x1 + dx/3, p1y = y1 + dy/3;
                    const p3x = x1 + 2*dx/3, p3y = y1 + 2*dy/3;
                    const p2x = p1x + (dx/3)*Math.cos(-Math.PI/3) - (dy/3)*Math.sin(-Math.PI/3);
                    const p2y = p1y + (dx/3)*Math.sin(-Math.PI/3) + (dy/3)*Math.cos(-Math.PI/3);
                    drawKoch(x1, y1, p1x, p1y, depth - 1);
                    drawKoch(p1x, p1y, p2x, p2y, depth - 1);
                    drawKoch(p2x, p2y, p3x, p3y, depth - 1);
                    drawKoch(p3x, p3y, x2, y2, depth - 1);
                }
            }

            function drawCantor(x, y, len, depth) {
                ctx2D.beginPath(); ctx2D.moveTo(x, y); ctx2D.lineTo(x + len, y);
                ctx2D.strokeStyle = '#facc15'; ctx2D.lineWidth = 8; ctx2D.stroke();
                if (depth > 1) {
                    drawCantor(x, y + 40, len / 3, depth - 1);
                    drawCantor(x + 2 * len / 3, y + 40, len / 3, depth - 1);
                }
            }

            if (currentFractal === 'tree') drawTree(400, 500, 140, 0, n);
            if (currentFractal === 'sierpinski') drawSierpinski(200, 450, 400, n);
            if (currentFractal === 'koch') {
                const cx = 400, cy = 250, sz = 150;
                const x1 = cx - sz, y1 = cy + sz/2;
                const x2 = cx + sz, y2 = cy + sz/2;
                const x3 = cx, y3 = cy - sz * Math.sqrt(3) + sz/2;
                drawKoch(x1, y1, x3, y3, n); drawKoch(x3, y3, x2, y2, n); drawKoch(x2, y2, x1, y1, n);
            }
            if (currentFractal === 'cantor') drawCantor(100, 50, 600, n);
        }

        // ================= 3D 렌더링 엔진 (Three.js) =================
        function render3D(n, r, a) {
            if (fractal3DObject) scene.remove(fractal3DObject);
            const vertices = []; const colors = [];
            
            if (currentFractal === 'tree') {
                const angleRad = THREE.MathUtils.degToRad(a);
                function rTree(matrix, len, depth) {
                    const p1 = new THREE.Vector3().setFromMatrixPosition(matrix);
                    const m2 = matrix.clone().multiply(new THREE.Matrix4().makeTranslation(0, len, 0));
                    const p2 = new THREE.Vector3().setFromMatrixPosition(m2);
                    vertices.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
                    const col = new THREE.Color('#4ade80').lerp(new THREE.Color('#8b5a2b'), depth/n);
                    colors.push(col.r, col.g, col.b, col.r, col.g, col.b);
                    if (depth > 1) {
                        const twist = new THREE.Matrix4().makeRotationY(Math.PI / 2); // 3D의 핵심: Y축 비틀기
                        rTree(m2.clone().multiply(twist).multiply(new THREE.Matrix4().makeRotationZ(angleRad)), len * r, depth - 1);
                        rTree(m2.clone().multiply(twist).multiply(new THREE.Matrix4().makeRotationZ(-angleRad)), len * r, depth - 1);
                    }
                }
                rTree(new THREE.Matrix4(), 30, n);
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                fractal3DObject = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({vertexColors: true}));
                fractal3DObject.position.y = -20;
            } 
            else if (currentFractal === 'sierpinski') {
                // 3D 공간에 2D 시에르핀스키 삼각형 렌더링 (회전 가능)
                function rSierp(x, y, size, depth) {
                    if (depth === 1) {
                        vertices.push(x, y, 0, x+size/2, y+size, 0, x+size, y, 0);
                        colors.push(0.2,0.5,1, 0.2,0.5,1, 0.2,0.5,1);
                    } else {
                        rSierp(x, y, size/2, depth-1);
                        rSierp(x+size/2, y, size/2, depth-1);
                        rSierp(x+size/4, y+size/2, size/2, depth-1);
                    }
                }
                rSierp(-50, -30, 100, n);
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                fractal3DObject = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({vertexColors: true, side: THREE.DoubleSide, transparent: true, opacity: 0.8}));
            }
            else if (currentFractal === 'koch') {
                function rKoch(p1, p2, depth) {
                    if (depth === 1) {
                        vertices.push(p1.x, p1.y, 0, p2.x, p2.y, 0);
                    } else {
                        const dx = p2.x - p1.x, dy = p2.y - p1.y;
                        const pa = new THREE.Vector3(p1.x + dx/3, p1.y + dy/3, 0);
                        const pc = new THREE.Vector3(p1.x + 2*dx/3, p1.y + 2*dy/3, 0);
                        const pb = new THREE.Vector3(
                            pa.x + (dx/3)*Math.cos(-Math.PI/3) - (dy/3)*Math.sin(-Math.PI/3),
                            pa.y + (dx/3)*Math.sin(-Math.PI/3) + (dy/3)*Math.cos(-Math.PI/3), 0
                        );
                        rKoch(p1, pa, depth-1); rKoch(pa, pb, depth-1); rKoch(pb, pc, depth-1); rKoch(pc, p2, depth-1);
                    }
                }
                const v1 = new THREE.Vector3(-40, -20, 0), v2 = new THREE.Vector3(40, -20, 0), v3 = new THREE.Vector3(0, 49.28, 0);
                rKoch(v1, v3, n); rKoch(v3, v2, n); rKoch(v2, v1, n);
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                fractal3DObject = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color: 0xe2e8f0}));
            }
            else if (currentFractal === 'cantor') {
                function rCantor(x, y, len, depth) {
                    // 3D 칸토어는 박스(Cube) 형태로 렌더링
                    const geo = new THREE.BoxGeometry(len, 4, 4);
                    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0xfacc15}));
                    mesh.position.set(x + len/2, y, 0);
                    fractal3DObject.add(mesh);
                    if (depth > 1) {
                        rCantor(x, y - 10, len/3, depth-1);
                        rCantor(x + 2*len/3, y - 10, len/3, depth-1);
                    }
                }
                fractal3DObject = new THREE.Group();
                rCantor(-60, 30, 120, n);
            }
            scene.add(fractal3DObject);
        }

        // ================= 대수학 패널 업데이트 =================
        function updatePanels(n, r) {
            let L1, totalCount, smallestLength, countFormula;

            if (currentFractal === 'tree') {
                L1 = 140; totalCount = Math.pow(2, n) - 1; smallestLength = L1 * Math.pow(r, n - 1); countFormula = `2<sup>n</sup> - 1`;
            } else if (currentFractal === 'sierpinski') {
                L1 = 400; r = 0.5; totalCount = Math.pow(3, n - 1); smallestLength = L1 * Math.pow(r, n - 1); countFormula = `3<sup>n-1</sup>`;
            } else if (currentFractal === 'koch') {
                L1 = 300; r = 1/3; totalCount = 3 * Math.pow(4, n - 1); smallestLength = L1 * Math.pow(r, n - 1); countFormula = `3 × 4<sup>n-1</sup>`;
            } else if (currentFractal === 'cantor') {
                L1 = 600; r = 1/3; totalCount = Math.pow(2, n - 1); smallestLength = L1 * Math.pow(r, n - 1); countFormula = `2<sup>n-1</sup>`;
            }

            const limitN = 1 - (Math.log10(L1) / Math.log10(r));

            document.getElementById('calc-count').textContent = totalCount.toLocaleString() + " 개";
            document.getElementById('calc-smallest').textContent = smallestLength.toFixed(2) + " px";
            
            const statusEl = document.getElementById('calc-status');
            if (smallestLength < 1) { statusEl.textContent = "최적화 발동 (1px 통제됨)"; statusEl.className = "data-value status-stop"; } 
            else if (smallestLength < 3) { statusEl.textContent = "경고 (한계점 근접)"; statusEl.className = "data-value status-warn"; } 
            else { statusEl.textContent = "안전 (연산 여유 있음)"; statusEl.className = "data-value status-safe"; }

            const rText = (currentFractal === 'koch' || currentFractal === 'cantor') ? '(1/3)' : r.toFixed(2);
            document.getElementById('formula-length').innerHTML = 
                `L<sub>n</sub> = L<sub>1</sub> × r<sup>n-1</sup> <br>` +
                `L<sub>${n}</sub> = ${L1} × ${rText}<sup>${n}-1</sup> <br>` + 
                `=> <span class="highlight">${smallestLength.toFixed(2)} px</span> &nbsp; (분할 개수: ${countFormula} = ${totalCount.toLocaleString()}개)`;

            document.getElementById('formula-log').innerHTML = 
                `L<sub>1</sub> × r<sup>n-1</sup> < 1 &nbsp; (양변에 상용로그 log 취함) <br>` +
                `n > 1 - { log(L<sub>1</sub>) / log(r) } <br>` +
                `n > 1 - { log(${L1}) / log(${rText}) } <br>` +
                `=> <span class="highlight">n > ${limitN.toFixed(2)}</span> &nbsp; (안전 한계 기저 조건: <b>${Math.floor(limitN)}</b> 단계)`;
        }

        // ================= 메인 실행 =================
        function update() {
            const r = parseFloat(ratioSlider.value);
            const n = parseInt(depthSlider.value);
            const a = parseInt(angleSlider.value);

            document.getElementById('angleVal').textContent = a;
            document.getElementById('ratioVal').textContent = r.toFixed(2);
            document.getElementById('depthVal').textContent = n;

            updatePanels(n, r);

            if (currentMode === '2D') render2D(n, r, a);
            else render3D(n, r, a);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (currentMode === '3D') {
                controls.update();
                renderer.render(scene, camera);
            }
        }

        angleSlider.addEventListener('input', update);
        ratioSlider.addEventListener('input', update);
        depthSlider.addEventListener('input', update);
        
        update();
        animate3D();
    </script>
</body>
</html>
