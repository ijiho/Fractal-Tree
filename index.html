<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프랙털 구조</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 5px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        .controls {
            background-color: #2a2a2a;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
        }
        canvas {
            background-color: #0f0f0f;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
            max-width: 100%;
        }
    </style>
</head>
<body>

    <h1>프랙털 시뮬레이터</h1>

    <div class="controls">
        <div class="control-group">
            <label for="angle">가지 회전 각도 (θ): <span id="angleVal">25</span>°</label>
            <input type="range" id="angle" min="10" max="90" value="25">
        </div>
        <div class="control-group">
            <label for="ratio">길이 감소 비율 (r): <span id="ratioVal">0.70</span></label>
            <input type="range" id="ratio" min="0.50" max="0.80" step="0.01" value="0.70">
        </div>
        <div class="control-group">
            <!-- 최대 렌더링 단계(n). 로그 부등식으로 도출된 한계값을 적용하는 부분 -->
            <label for="depth">렌더링 한계 단계 (n): <span id="depthVal">10</span></label>
            <input type="range" id="depth" min="1" max="14" value="10">
        </div>
    </div>

    <canvas id="fractalCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        const angleSlider = document.getElementById('angle');
        const ratioSlider = document.getElementById('ratio');
        const depthSlider = document.getElementById('depth');

        const angleVal = document.getElementById('angleVal');
        const ratioVal = document.getElementById('ratioVal');
        const depthVal = document.getElementById('depthVal');

        // 프랙탈 나무를 그리는 재귀 함수
        function drawTree(startX, startY, length, angle, depth, branchWidth) {
            ctx.beginPath();
            ctx.save(); // 현재 캔버스 상태(좌표계) 저장

            // 1. 삼각함수를 활용한 좌표 변환식 적용
            // x_{n+1} = x_n + L_{n+1}*cos(θ), y_{n+1} = y_n + L_{n+1}*sin(θ)
            // 캔버스에서는 translate와 rotate를 통해 기준점을 이동시키는 방식을 사용합니다.
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length); // 위쪽 방향으로 선 긋기
            
            // 가지 굵기 및 색상 설정
            ctx.lineWidth = branchWidth;
            // 끝으로 갈수록(depth가 작을수록) 초록색 잎처럼 보이게 색상 변경
            ctx.strokeStyle = depth <= 2 ? '#4ade80' : '#8b5a2b';
            ctx.stroke();

            // 2. 로그 부등식으로 도출된 기저 조건 (Base Case) 확인
            // depth(n)가 0보다 커야만 계속 연산(1픽셀 미만 연산 통제)
            if (depth > 0) {
                // 3. 등비수열의 점화식 적용: L_{n+1} = L_n * r
                const nextLength = length * parseFloat(ratioSlider.value);
                const splitAngle = parseInt(angleSlider.value);
                const nextWidth = branchWidth * 0.7;

                // 왼쪽, 오른쪽으로 각각 뻗어나가는 재귀 호출
                drawTree(0, -length, nextLength, -splitAngle, depth - 1, nextWidth);
                drawTree(0, -length, nextLength, splitAngle, depth - 1, nextWidth);
            }

            ctx.restore(); // 이전 좌표계로 복구
        }

        // 화면을 다시 그리는 업데이트 함수
        function update() {
            // 화면 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // UI 값 텍스트 업데이트
            angleVal.textContent = angleSlider.value;
            ratioVal.textContent = parseFloat(ratioSlider.value).toFixed(2);
            depthVal.textContent = depthSlider.value;

            // 초기 시작값 설정
            const initialX = canvas.width / 2;
            const initialY = canvas.height;
            const initialLength = 140; // L_1 초기 나뭇가지 길이
            const initialAngle = 0;
            const currentDepth = parseInt(depthSlider.value);
            const initialWidth = 10;

            // 프랙탈 렌더링 시작
            drawTree(initialX, initialY, initialLength, initialAngle, currentDepth, initialWidth);
        }

        // 슬라이더 값이 변경될 때마다 화면 실시간 업데이트
        angleSlider.addEventListener('input', update);
        ratioSlider.addEventListener('input', update);
        depthSlider.addEventListener('input', update);

        // 웹페이지 로딩 시 최초 1회 렌더링
        update();
    </script>
</body>
</html>
