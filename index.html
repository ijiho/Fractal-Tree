<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프랙탈 나무</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 5px;
            text-align: center;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }
        .controls {
            background-color: #2a2a2a;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
        }
        canvas {
            background-color: #0f0f0f;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
            max-width: 100%;
            border: 1px solid #333;
        }
        /* 실시간 연산 데이터 패널 스타일 */
        .data-panel {
            margin-top: 20px;
            background-color: #222;
            border-left: 4px solid #4ade80;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 760px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .data-panel h3 {
            margin: 0 0 15px 0;
            color: #4ade80;
            font-size: 16px;
        }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .data-item {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .data-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            display: block;
        }
        .data-value {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .status-safe { color: #4ade80; }
        .status-warn { color: #facc15; }
        .status-stop { color: #ef4444; }
    </style>
</head>
<body>

    <h1>프랙탈 나무 시뮬레이터</h1>

    <!-- 사용자 입력 컨트롤러 -->
    <div class="controls">
        <div class="control-group">
            <label for="angle">가지 회전 각도 (θ): <span id="angleVal">25</span>°</label>
            <input type="range" id="angle" min="10" max="90" value="25">
        </div>
        <div class="control-group">
            <label for="ratio">길이 감소 비율 (r): <span id="ratioVal">0.70</span></label>
            <input type="range" id="ratio" min="0.50" max="0.80" step="0.01" value="0.70">
        </div>
        <div class="control-group">
            <label for="depth">렌더링 한계 단계 (n): <span id="depthVal">10</span></label>
            <input type="range" id="depth" min="1" max="14" value="10">
        </div>
    </div>

    <!-- 시각화 캔버스 -->
    <canvas id="fractalCanvas" width="800" height="500"></canvas>

    <!-- 실시간 연산 데이터 패널 -->
    <div class="data-panel">
        <h3>📊 실시간 대수학 연산 데이터</h3>
        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">총 나뭇가지 개수 (등비수열의 합)</span>
                <span class="data-value" id="calc-branches">0 개</span>
            </div>
            <div class="data-item">
                <span class="data-label">최종 단계 가지 1개의 길이 (L_n)</span>
                <span class="data-value" id="calc-smallest">0 px</span>
            </div>
            <div class="data-item">
                <span class="data-label">모든 가지의 총 길이 합산</span>
                <span class="data-value" id="calc-total-length">0 px</span>
            </div>
            <div class="data-item">
                <span class="data-label">알고리즘 상태 (1px 통제 기준)</span>
                <span class="data-value status-safe" id="calc-status">안전</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        const angleSlider = document.getElementById('angle');
        const ratioSlider = document.getElementById('ratio');
        const depthSlider = document.getElementById('depth');

        const angleVal = document.getElementById('angleVal');
        const ratioVal = document.getElementById('ratioVal');
        const depthVal = document.getElementById('depthVal');

        const L1 = 120; // 초기 몸통 길이

        // 1. 프랙탈 나무 그리기 (재귀 함수 - 정보 알고리즘)
        function drawTree(startX, startY, length, angle, depth, branchWidth) {
            ctx.beginPath();
            ctx.save(); 

            // 좌표 변환 (삼각함수 원리 적용)
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length); 
            
            ctx.lineWidth = branchWidth;
            ctx.strokeStyle = depth <= 2 ? '#4ade80' : '#8b5a2b';
            ctx.stroke();

            // 기저 조건 (Base Case)
            if (depth > 0) {
                const nextLength = length * parseFloat(ratioSlider.value);
                const splitAngle = parseInt(angleSlider.value);
                const nextWidth = branchWidth * 0.7;

                drawTree(0, -length, nextLength, -splitAngle, depth - 1, nextWidth);
                drawTree(0, -length, nextLength, splitAngle, depth - 1, nextWidth);
            }

            ctx.restore(); 
        }

        // 2. 실시간 수학 연산 데이터 계산 및 표시 (대수학)
        function updateDataPanel(r, n) {
            // 2-1. 총 나뭇가지 개수 (첫 항이 1, 공비가 2인 등비수열의 n항까지의 합: 2^n - 1)
            const totalBranches = Math.pow(2, n) - 1;
            document.getElementById('calc-branches').textContent = totalBranches.toLocaleString() + " 개";

            // 2-2. 최종 단계 가지 1개의 길이 (등비수열 일반항: L_1 * r^(n-1))
            const smallestLength = L1 * Math.pow(r, n - 1);
            document.getElementById('calc-smallest').textContent = smallestLength.toFixed(2) + " px";

            // 2-3. 모든 가지 길이의 총합 (공비가 2r인 등비수열의 합)
            let totalLength = 0;
            if (2 * r === 1) {
                totalLength = L1 * n;
            } else {
                totalLength = L1 * (1 - Math.pow(2 * r, n)) / (1 - (2 * r));
            }
            document.getElementById('calc-total-length').textContent = totalLength.toLocaleString(undefined, {maximumFractionDigits: 0}) + " px";

            // 2-4. 알고리즘 상태 판단 (로그 부등식 제어 기준)
            const statusEl = document.getElementById('calc-status');
            if (smallestLength < 1) {
                statusEl.textContent = "최적화 완료 (1px 미만 제어됨)";
                statusEl.className = "data-value status-stop";
            } else if (smallestLength < 5) {
                statusEl.textContent = "경고 (한계점 접근 중)";
                statusEl.className = "data-value status-warn";
            } else {
                statusEl.textContent = "안전 (추가 연산 여유 있음)";
                statusEl.className = "data-value status-safe";
            }
        }

        // 3. 화면 업데이트 메인 함수
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const r = parseFloat(ratioSlider.value);
            const n = parseInt(depthSlider.value);
            const angle = parseInt(angleSlider.value);

            // UI 텍스트 갱신
            angleVal.textContent = angle;
            ratioVal.textContent = r.toFixed(2);
            depthVal.textContent = n;

            // 데이터 패널 갱신
            updateDataPanel(r, n);

            // 프랙탈 렌더링 시작 (화면 하단 중앙에서 출발)
            drawTree(canvas.width / 2, canvas.height, L1, 0, n, 10);
        }

        // 이벤트 리스너 등록
        angleSlider.addEventListener('input', update);
        ratioSlider.addEventListener('input', update);
        depthSlider.addEventListener('input', update);

        // 최초 실행
        update();
    </script>
</body>
</html>
